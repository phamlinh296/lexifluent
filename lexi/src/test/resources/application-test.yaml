spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  ai:
    openai:
      api-key: test-key
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret

lexi:
  jwt:
    secret: test-secret-key-min-256-bits-for-hmac-sha256-signing
    access-expiry: 900
    refresh-expiry: 604800
  ai:
    default-provider: OPENAI
    fallback-provider: CLAUDE
    cheap-model: gpt-4o-mini
    strong-model: gpt-4o
    quota:
      daily-tokens-per-user: 50000
